    <script>
      // Canvas size selection popup and redirect logic
      document.addEventListener('DOMContentLoaded', function () {
        // Dropdown for 'New' button
        const newBtn = document.getElementById('newBtn');
        const dropdown = document.getElementById('dropdown');
        const orientationModal = document.getElementById('orientationModal');
        const continueBtn = document.getElementById('continueBtn');
        let selectedSize = null;
        let selectedOrientation = 'portrait';

        // Show orientation modal when a size is selected
        if (dropdown) {
          dropdown.querySelectorAll('.open-modal').forEach(function (item) {
            item.addEventListener('click', function (e) {
              e.stopPropagation();
              selectedSize = item.getAttribute('data-size');
              orientationModal.classList.remove('hidden');
              dropdown.classList.add('hidden');
            });
          });
        }

        // Orientation selection
        if (orientationModal) {
          orientationModal.querySelectorAll('.orientation-option').forEach(function (opt) {
            opt.addEventListener('click', function () {
              orientationModal.querySelectorAll('.orientation-option div').forEach(function (d) {
                d.classList.remove('bg-cyan-600');
                d.classList.add('bg-gray-400');
              });
              this.querySelector('div').classList.remove('bg-gray-400');
              this.querySelector('div').classList.add('bg-cyan-600');
              selectedOrientation = this.getAttribute('data-orientation');
            });
          });
          // Close modal
          orientationModal.querySelector('.close-modal').addEventListener('click', function () {
            orientationModal.classList.add('hidden');
          });
        }

        // Continue button: redirect to canvas page
        if (continueBtn) {
          continueBtn.addEventListener('click', function () {
            orientationModal.classList.add('hidden');
            // Redirect to canvas page with size and orientation as query params
            if (selectedSize && selectedOrientation) {
              window.location.href = `canva-new.html?size=${encodeURIComponent(selectedSize)}&orientation=${encodeURIComponent(selectedOrientation)}`;
            } else {
              window.location.href = 'canva-new.html';
            }
          });
        }
      });
    </script

    <!-- Sidebar Dropdown Script -->
    <script>
      // Dropdown for 'New' button in sidebar
      document.addEventListener('DOMContentLoaded', function () {
        const newBtn = document.getElementById('newBtn');
        const dropdown = document.getElementById('dropdown');
        let dropdownOpen = false;

        if (newBtn && dropdown) {
          newBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
            dropdownOpen = !dropdownOpen;
          });

          // Hide dropdown when clicking outside
          document.addEventListener('click', function (e) {
            if (dropdownOpen && !dropdown.contains(e.target) && !newBtn.contains(e.target)) {
              dropdown.classList.add('hidden');
              dropdownOpen = false;
            }
          });
        }

        // Mobile sidebar toggle (if present)
        const toggle = document.getElementById('mobileToggle');
        const sidebar = document.getElementById('sidebar');
        if (toggle && sidebar) {
          toggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
          });

          document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
              if (window.innerWidth < 1024) {
                sidebar.classList.add('-translate-x-full');
              }
            }
          });
        }
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const rowsPerPage = 10;
        const table = document.querySelector("table");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        const totalPages = Math.ceil(rows.length / rowsPerPage);

        const inputPage = document.querySelector("input[type='text']");
        let currentPage = 1;

    function showPage(page) {
      currentPage = page;
      rows.forEach((row, index) => {
        row.style.display =
          index >= (page - 1) * rowsPerPage && index < page * rowsPerPage
            ? ""
            : "none";
      });
    }

    // Optionally, call showPage(1) to initialize
    showPage(1);
  });
</script>
