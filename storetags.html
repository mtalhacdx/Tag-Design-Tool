<body class="h-screen flex flex-col font-system">

  <!-- Header -->
  <div class="text-black px-6 py-4 shadow-lg flex items-center justify-between h-[70px]"
    style="background-color: #ff8c00;">
    <div class="flex items-center gap-3">
      <i class="fas fa-copy text-3xl text-black p-2 rounded-md w-9 h-9 flex items-center justify-center"></i>
      <h1 class="text-3xl font-semibold tracking-wide text-black">Templates</h1>
    </div>

    <!-- Mobile Menu Toggle -->
    <button id="mobileToggle" class="lg:hidden text-black text-2xl focus:outline-none">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <div class="flex flex-1 overflow-hidden relative">

    <!-- Sidebar (Mobile + Desktop) -->
    <div id="sidebar" class="w-[80px] bg-orange-primary flex flex-col justify-between p-0 shadow-lg flex-shrink-0
      lg:relative fixed top-[70px] left-0 h-[calc(100vh-70px)] z-50 transition-transform duration-300
      transform -translate-x-full lg:translate-x-0 lg:flex"
      style="background-color: #ff8c00!important; margin-top: -80px!important;">

      <!-- Top Buttons -->
      <div class="flex flex-col" style="background-color: #ff8c00!important;">
        <!-- NEW Button + Dropdown -->
        <div id="newBtn"
          class="relative hovnew cursor-pointer px-1 py-3 h-20 flex flex-col items-center justify-center text-white hover:bg-white hover:bg-opacity-10 transition-all">
          <i class="far fa-file text-lg mb-1"></i>
          <span class="text-xs font-medium">New</span>
          <i class="fas fa-chevron-down text-xs absolute bottom-2 right-2 transition-transform"></i>

          <!-- Dropdown -->
          <div id="dropdown"
            class="absolute top-full left-0 mt-1 hidden flex-col bg-gray-50 rounded shadow-lg border w-52 z-50 max-h-[300px] overflow-y-auto hide-scrollbar">
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="1UP">
              <i class="fas fa-file-medical"></i><span>1UP</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="1UP (LEGAL)">
              <i class="fas fa-file-medical"></i><span>1UP (LEGAL)</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="2UP">
              <i class="fas fa-file-medical"></i><span>2UP</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="4UP">
              <i class="fas fa-file-medical"></i><span>4UP</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="4UP (4.25 x 5.1)">
              <i class="fas fa-file-medical"></i><span>4UP (4.25 x 5.1)</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="8UP">
              <i class="fas fa-file-medical"></i><span>8UP</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="16UP">
              <i class="fas fa-file-medical"></i><span>16UP</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="Avery 5160">
              <i class="fas fa-file-medical"></i><span>Avery 5160</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"
              data-size="Avery 5163">
              <i class="fas fa-file-medical"></i><span>Avery 5163</span>
            </div>
            <div
              class="px-3 py-2 hover:bg-gray-100 flex items-center gap-2 text-sm text-black cursor-pointer open-modal"

            </div>
          </div>
        </div>

        <div

          class="px-1 py-3 h-20 hovnew flex flex-col items-center justify-center text-white hover:bg-white hover:bg-opacity-10 transition-all text-center">

          <span class="text-xs font-medium">Editor</span>
        </div>
    <script>
      // Show Editor button if sessionStorage says so
      document.addEventListener('DOMContentLoaded', function () {
        if (sessionStorage.getItem('showEditorBtn')) {
          var editorBtn = document.getElementById('editorSidebarBtn');
          if (editorBtn) editorBtn.style.display = '';
          editorBtn.addEventListener('click', function () {
            window.location.href = 'canva-new.html';
          });
        }
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const rowsPerPage = 10;
        const table = document.querySelector("table");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        const totalPages = Math.ceil(rows.length / rowsPerPage);

        const inputPage = document.querySelector("input[type='text']");
        let currentPage = 1;

        function showPage(page) {
          currentPage = page;
          rows.forEach((row, index) => {
            row.style.display =
              index >= (page - 1) * rowsPerPage && index < page * rowsPerPage
                ? ""
                : "none";
          });
          inputPage.value = page;
          document.querySelector(".total-pages").innerText = totalPages;
        }

        // Init
        showPage(1);

        // Navigation buttons
        document.querySelector(".prev-page").onclick = () => {
          if (currentPage > 1) showPage(currentPage - 1);
        };
        document.querySelector(".next-page").onclick = () => {
          if (currentPage < totalPages) showPage(currentPage + 1);
        };
        document.querySelector(".first-page").onclick = () => showPage(1);
        document.querySelector(".last-page").onclick = () => showPage(totalPages);

        inputPage.addEventListener("change", () => {
          let page = parseInt(inputPage.value);
          if (page >= 1 && page <= totalPages) {
            showPage(page);
          } else {
            inputPage.value = currentPage;
          }
        });
      });
    </script>

    <script>
      let selectedSize = null;
      let selectedOrientation = null;

      document.querySelectorAll('.open-modal').forEach(item => {
        item.addEventListener('click', () => {
          selectedSize = item.getAttribute('data-size');
          selectedOrientation = null; // reset jab modal khule
          document.getElementById('orientationModal').classList.remove('hidden');
        });
      });

      document.querySelectorAll('.orientation-option').forEach(option => {
        option.addEventListener('click', () => {
          selectedOrientation = option.getAttribute('data-orientation');
          document.querySelectorAll('.orientation-option div').forEach(div =>
            div.classList.remove('ring-4', 'ring-cyan-500')
          );
          option.querySelector('div').classList.add('ring-4', 'ring-cyan-500');
        });
      });

      document.querySelector('.close-modal').addEventListener('click', () => {
        document.getElementById('orientationModal').classList.add('hidden');
      });

      document.getElementById('continueBtn').addEventListener('click', () => {
        // Agar orientation select nahi hui to default "Portrait"
        if (!selectedOrientation) {
          selectedOrientation = "Portrait";
        }

        if (selectedSize) {
          const url = `canva-new.html?size=${encodeURIComponent(selectedSize)}&orientation=${encodeURIComponent(selectedOrientation)}`;
          window.location.href = url;
        }
      });
    </script>

          arrow.classList.remove("rotate-180");
        }
      });
    </script>
